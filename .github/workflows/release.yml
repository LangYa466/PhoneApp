name: Release on commit prefix

on:
  push:
    branches: [master]

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Extract versionName from app/build.gradle
        id: ver
        run: |
          VERSION_NAME=$(grep -E '^\s*versionName\s*=' app/build.gradle | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VERSION_NAME" ]; then
            echo "Could not parse versionName from app/build.gradle" >&2
            exit 1
          fi
          echo "versionName=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon

      - name: Rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          if [ -z "$SRC" ]; then
            echo "No APK found" >&2
            exit 1
          fi
          DEST="Phone-${{ steps.ver.outputs.versionName }}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: ${{ github.event.head_commit.message }}
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
